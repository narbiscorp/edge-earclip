name: dashboard-deploy

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'webapp/ota/**'
      - 'docs/**'
      - 'index.html'
      - '.github/workflows/dashboard-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# GitHub force-migrates Node-20 JS actions (checkout, setup-node, upload-pages-artifact,
# configure-pages, deploy-pages) to Node 24 on 2026-06-16. Opt in now so the pinned versions
# are exercised + verified on Node 24 before it becomes the default. Drop once actions are bumped.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        working-directory: dashboard
        env:
          # Supabase config — inlined into the bundle by Vite at build time.
          # Set these in Settings → Secrets and variables → Actions on GitHub.
          # If unset, the dashboard builds without cloud save (tuning still
          # works) and shows a console warning.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm ci && npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/webapp/ota _site/docs
          # Dashboard: deploy dist files at root; rename index.html → app.html
          # so the hub index.html can own the root URL.
          cp -r dashboard/dist/. _site/
          mv _site/index.html _site/app.html
          # 404 fallback stays as dashboard SPA so deep-links still resolve.
          cp _site/app.html _site/404.html
          # Hub landing page
          cp index.html _site/index.html
          # OTA updater
          cp webapp/ota/index.html _site/webapp/ota/index.html
          # Protocol + algorithm docs: render every docs/*.md to styled HTML. Each becomes
          # _site/docs/<name>.md/index.html (a directory keeping the .md suffix), so the existing
          # .md URLs render as HTML on Pages — no link changes needed. See docs/render.mjs.
          npm --prefix docs install --no-save
          node docs/render.mjs _site/docs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
