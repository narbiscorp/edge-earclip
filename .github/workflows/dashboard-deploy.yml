name: dashboard-deploy

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'webapp/ota/**'
      - 'docs/**'
      - 'index.html'
      - '.github/workflows/dashboard-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        working-directory: dashboard
        run: npm ci && npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/webapp/ota _site/docs
          # Dashboard: deploy dist files at root; rename index.html → app.html
          # so the hub index.html can own the root URL.
          cp -r dashboard/dist/. _site/
          mv _site/index.html _site/app.html
          # 404 fallback stays as dashboard SPA so deep-links still resolve.
          cp _site/app.html _site/404.html
          # Hub landing page
          cp index.html _site/index.html
          # OTA updater
          cp webapp/ota/index.html _site/webapp/ota/index.html
          # Protocol doc (served as plain text / raw markdown)
          cp docs/bluetooth-protocol.md _site/docs/bluetooth-protocol.md

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
