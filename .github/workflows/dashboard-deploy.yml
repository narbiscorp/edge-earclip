name: dashboard-deploy

on:
  push:
    branches: [main]
    # No paths filter: rebuild on any main push so the dashboard's
    # build-stamp (`relay-v5 · <ts>-<sha>`) always matches `git log HEAD`.
    # Firmware-only commits previously didn't redeploy, which was
    # confusing because the visible SHA lagged the actual repo state.
    # Build is ~90 s; not worth optimizing.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
